name: "Tool Request (Add / Update / Remove)"
description: "Request to add, update, or archive a Windows debloat or privacy tool."
title: "[Action]: "
labels: ["tool-management", "documentation"]

body:
  - type: markdown
    attributes:
      value: "Please select the action type and fill out the relevant sections below. Maintainers will verify and apply changes within 3 to 5 days."

  - type: dropdown
    id: action_type
    attributes:
      label: "Action Type"
      description: "What would you like to do?"
      options:
        - "Add New Tool"
        - "Update Existing Tool"
        - "Remove or Archive Tool"
    validations:
      required: true

  - type: input
    id: tool_name
    attributes:
      label: "Tool Name"
      description: "Exact name as it appears on the official repo or website"
      placeholder: "e.g. ChrisTitusTech/winutil"
    validations:
      required: true

  - type: input
    id: tool_url
    attributes:
      label: "Official URL or Repository"
      placeholder: "https://github.com/example/tool"
    validations:
      required: true

  - type: dropdown
    id: tool_type
    attributes:
      label: "Distribution Type"
      options:
        - "PowerShell Script"
        - "GUI Application"
        - "CLI Tool"
        - "Portable EXE"
        - "Web Generator"
        - "Batch or Config Script"
        - "Installer"
        - "Other"
    validations:
      required: true

  - type: checkboxes
    id: os_compatibility
    attributes:
      label: "Windows Compatibility"
      options:
        - label: "Windows 10 (22H2+)"
        - label: "Windows 11 (23H2+)"
        - label: "Server or Enterprise"
    validations:
      required: true

  - type: textarea
    id: reasoning
    attributes:
      label: "Details and Justification"
      description: "If adding: provide a brief description, launch command, and verification notes. If updating: explain what changed. If removing: explain why it should be archived (abandoned, broken, unsafe, etc.)."
      placeholder: "Provide clear context to speed up review."
    validations:
      required: true

  - type: textarea
    id: verification_proof
    attributes:
      label: "Verification Evidence (Optional)"
      description: "Link to recent commits, releases, VM test results, screenshots, or security audits."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-Submission Checklist"
      options:
        - label: "I have searched existing files for duplicates"
        - label: "URL uses HTTPS and points to the official source"
        - label: "For removal requests: I have confirmed the tool is broken, unsafe, or unmaintained for over 12 months"
        - label: "I understand this repository only links to tools and does not host binaries"
    validations:
      required: true