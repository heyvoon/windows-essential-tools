name: 🤖 Auto-Process Tool Submissions

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-submission:
    # Only run on tool-request template + not already processed
    if: |
      contains(github.event.issue.labels.*.name, 'tool-management') &&
      !contains(github.event.issue.labels.*.name, 'processed') &&
      !github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Process submission
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          TODAY_DATE: ${{ steps.date.outputs.date }}
        id: process
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          python .github/scripts/auto-add-tool.py

      - name: 📝 Create PR with changes
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add ${{ github.event.issue.title }} via issue #${{ github.event.issue.number }}"
          branch: auto-add-tool-${{ github.event.issue.number }}
          delete-branch: true
          title: "📦 Auto: Add tool from issue #${{ github.event.issue.number }}"
          body: |
            🤖 **Auto-generated PR** from issue #${{ github.event.issue.number }}
            
            👤 Submitted by: @${{ github.event.issue.user.login }}
            📋 [View original issue](https://github.com/${{ github.repository }}/issues/${{ github.event.issue.number }})
            
            ### ✅ Maintainer Checklist
            - [ ] Verify tool works on Win10 22H2+ / Win11 23H2+
            - [ ] Confirm URL points to official source (no malware)
            - [ ] Check entry formatting matches template
            - [ ] Test launch command in VM if possible
            
            > ⚠️ **Do not merge** if tool requires disabling antivirus, has obfuscated code, or breaks core Windows features.
          labels: |
            🤖 auto-generated
            📦 tool addition
            🔍 needs-review
          assignees: ${{ github.repository_owner }}

      - name: 💬 Comment on issue
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ${{ steps.process.outputs.conclusion == 'success' && '✅ **Submission processed!** A PR has been created for maintainer review. You''ll be notified when it''s merged.' || '❌ **Submission failed validation.** Please check the issue for error details and resubmit.' }}
            
            > 🔗 [View PR](https://github.com/${{ github.repository }}/pulls?q=is:pr+is:open+${{ github.event.issue.number }}) | [Contribution Guide](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)
          reactions: '+1'

      - name: 🏷️ Label issue as processed
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['processed', '🤖 auto-processed']
            });