name: "🔄 Manual: Update Existing Tool"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub Issue Number"
        required: true
        type: string
      tool_name:
        description: "Exact tool name to update"
        required: true
        type: string
      update_type:
        description: "What changed?"
        required: true
        type: choice
        options:
          - URL changed
          - New version released
          - Compatibility update
          - Broken link fix
          - Description/notes update
          - Other
      old_url:
        description: "Old URL (if changed)"
        required: false
        type: string
      new_url:
        description: "New URL (if changed)"
        required: false
        type: string
      target_files:
        description: "Files to update (comma-separated)"
        required: true
        type: string
        default: "tools/active-github.md"
      notes:
        description: "Additional context"
        required: false
        type: string
        default: "Updated via issue #ISSUE_NUMBER"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update-tool:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📅 Get today's date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: ✏️ Update files
        run: |
          IFS=',' read -ra FILES <<< "${{ inputs.target_files }}"
          for file in "${FILES[@]}"; do
            file=$(echo "$file" | xargs)
            if [ -f "$file" ]; then
              echo "✏️ Updating $file"
              if [ -n "${{ inputs.new_url }}" ] && [ -n "${{ inputs.old_url }}" ]; then
                # Replace old URL with new URL
                sed -i "s|${{ inputs.old_url }}|${{ inputs.new_url }}|g" "$file"
              fi
              # Update Last Verified date for this tool
              sed -i "/### \[.*${{ inputs.tool_name }}.*\]/,/### \[/ s/\*\*Last Verified:\*\* .*/\*\*Last Verified:\*\* ${{ steps.date.outputs.date }}/" "$file"
            else
              echo "⚠️ File not found: $file"
            fi
          done

      - name: 🌿 Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ${{ inputs.tool_name }} (${{ inputs.update_type }}) via #${{ inputs.issue_number }}"
          branch: manual-update-tool-${{ inputs.issue_number }}
          delete-branch: true
          title: "🔄 Update: ${{ inputs.tool_name }}"
          body: |
            **Issue:** #${{ inputs.issue_number }}  
            **Tool:** ${{ inputs.tool_name }}  
            **Update Type:** ${{ inputs.update_type }}  
            ${{ inputs.old_url && format('**Old URL:** {0}', inputs.old_url) }}
            ${{ inputs.new_url && format('**New URL:** {0}', inputs.new_url) }}

            ### ✅ Maintainer Checklist
            - [ ] Verified new URL is official source
            - [ ] Confirmed tool still functional
            - [ ] All references updated across files
          labels: |
            🔄 tool update
            🔍 needs-review
          assignees: ${{ github.repository_owner }}

      - name: 💬 Comment on issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ inputs.issue_number }}
          body: |
            ✅ **Tool updated!** PR created: ${{ github.server_url }}/${{ github.repository }}/pulls?q=${{ inputs.tool_name }}
          reactions: '+1'

      - name: 🏷️ Label issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: ${{ inputs.issue_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['✅ updated', 'processed']
            });